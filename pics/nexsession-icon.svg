    <path d="M90 146L88 168" stroke="#26304F" stroke-width="2"/>
    <path d="M106 146L104 168" stroke="#26304F" stroke-width="2"/>
    <path d="M122 146L120 168" stroke="#26304F" stroke-width="2"/>
    <path d="M138 146L136 168" stroke="#26304F" stroke-width="2"/>
