<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#6B21A8" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#1E1B4B" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#090A18" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="51" y1="119" x2="207" y2="194" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25115C"/>
      <stop offset="0.52" stop-color="#0F1435"/>
      <stop offset="1" stop-color="#050711"/>
    </linearGradient>
    <linearGradient id="keyWhite" x1="70" y1="137" x2="181" y2="174" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#C6D2E8"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="60" y1="73" x2="195" y2="117" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.04 0 0 0 0 0.85 0 0 0 0.65 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.72 0 0 0 0 0.83 0 0 0 0.8 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amberGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.96 0 0 0 0 0.43 0 0 0 0 0.03 0 0 0 0.85 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="purpleGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.65 0 0 0 0 0.13 0 0 0 0 0.95 0 0 0 0.85 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- transparent-friendly rounded app tile -->
  <rect x="18" y="18" width="220" height="220" rx="48" fill="url(#bgGlow)"/>
  <rect x="19" y="19" width="218" height="218" rx="47" stroke="#8B5CF6" stroke-opacity="0.22" stroke-width="2"/>

  <!-- shadow/base glow -->
  <ellipse cx="128" cy="191" rx="82" ry="17" fill="#050711" opacity="0.6"/>
  <ellipse cx="128" cy="187" rx="72" ry="10" fill="#6B21A8" opacity="0.22" filter="url(#softGlow)"/>

  <!-- audio interface / keyboard body -->
  <path d="M53 129C53 119 61 111 71 111H183C191 111 198 116 201 124L211 156C214 167 206 178 195 178H64C55 178 48 171 49 162L53 129Z" fill="url(#bodyGrad)" stroke="#0B1029" stroke-width="3"/>
  <path d="M57 124H198L206 151H51L57 124Z" fill="#111936"/>
  <path d="M62 129H192L196 142H58L62 129Z" fill="#0A0E22" opacity="0.8"/>

