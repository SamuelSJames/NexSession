  </g>
  <g fill="#090B16">
    <path d="M70 145H80L78 158H68L70 145Z"/>
    <path d="M94 145H104L102 158H92L94 145Z"/>
    <path d="M110 145H120L118 158H108L110 145Z"/>
    <path d="M142 145H152L150 158H140L142 145Z"/>
    <path d="M158 145H168L166 158H156L158 145Z"/>
    <path d="M174 145H184L182 158H172L174 145Z"/>
  </g>

  <!-- audio interface controls -->
  <circle cx="181" cy="160" r="6" fill="#0B1029" stroke="#F59E0B" stroke-width="2" filter="url(#amberGlow)"/>
  <circle cx="197" cy="160" r="5" fill="#0B1029" stroke="#F59E0B" stroke-width="2"/>
  <rect x="69" y="162" width="38" height="4" rx="2" fill="#06B6D4" opacity="0.75" filter="url(#cyanGlow)"/>

  <!-- waveform / signal path -->
  <path d="M62 121C76 103 91 137 106 116C121 95 135 131 151 108C166 86 179 111 195 92" stroke="url(#cyanLine)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  <path d="M62 121C76 103 91 137 106 116C121 95 135 131 151 108C166 86 179 111 195 92" stroke="#FDF7FF" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- routing nodes -->
