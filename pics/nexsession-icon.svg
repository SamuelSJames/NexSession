    <circle cx="126" cy="67" r="12"/>
    <circle cx="188" cy="86" r="13"/>
  </g>

  <!-- subtle ports and highlights -->
  <path d="M59 122C79 116 111 115 142 116C166 117 186 120 199 126" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="2"/>
  <path d="M65 176H193" stroke="#06B6D4" stroke-opacity="0.35" stroke-width="2"/>
